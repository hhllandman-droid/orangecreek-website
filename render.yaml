databases:
  - name: orangecreek-db
    databaseName: orangecreek
    user: orangecreek
    plan: basic-256mb
    region: frankfurt
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: web
    name: orangecreek-website
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install --include=dev --prefer-offline --no-audit --no-fund && npm run build
    startCommand: sh scripts/start-production.sh
    preDeployCommand: npx tsx scripts/ensure-schema.ts && npm run migrate && npm run seed
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NEXT_PUBLIC_SERVER_URL
        value: https://orangecreek.co
      - key: DATABASE_URI
        fromDatabase:
          name: orangecreek-db
          property: connectionString
      - key: PAYLOAD_SECRET
        generateValue: true
      - key: PAYLOAD_DEBUG
        value: "true"
