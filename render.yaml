databases:
  - name: orangecreek-db
    databaseName: orangecreek
    user: orangecreek
    plan: basic-256mb
    region: frankfurt
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: web
    name: orangecreek-website
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install --include=dev --prefer-offline --no-audit --no-fund && npm run build
    startCommand: npm start
    preDeployCommand: npx tsx scripts/ensure-schema.ts && npm run migrate && npm run seed
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NEXT_PUBLIC_SERVER_URL
        value: https://orangecreek.co
      - key: DATABASE_URI
        fromDatabase:
          name: orangecreek-db
          property: connectionString
      - key: PAYLOAD_SECRET
        generateValue: true
      - key: BIRD_API_KEY
        sync: false
      - key: BIRD_WORKSPACE_ID
        sync: false
      - key: BIRD_CHANNEL_ID
        sync: false
      - key: BIRD_FROM_EMAIL
        value: info@orangecreek.co
      - key: BIRD_FROM_NAME
        value: Orange Creek Capital
      - key: ADMIN_RESET_PASSWORD
        sync: false
      - key: ADMIN_RESET_SECRET
        sync: false
